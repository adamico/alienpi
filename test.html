<!doctype html>
<html>
  <head>
    <title>Alien Orbit Assault | Test Scene</title>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        background: #000;
        overflow: hidden;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: #fff;
      }
      canvas {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 1;
      }
      #hint-overlay {
        position: absolute;
        top: 0;
        right: 0;
        width: 280px;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 32px;
        box-sizing: border-box;
        pointer-events: none;
        z-index: 100;
      }
      #ui-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 280px;
        height: 100vh;
        background: rgba(15, 15, 25, 0.9);
        backdrop-filter: blur(12px);
        border-right: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        flex-direction: column;
        padding: 24px;
        box-sizing: border-box;
        z-index: 100;
        box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
        pointer-events: auto;
        overflow-y: auto;
      }

      /* Custom Scrollbar */
      #ui-overlay::-webkit-scrollbar {
        width: 6px;
      }
      #ui-overlay::-webkit-scrollbar-track {
        background: transparent;
      }
      #ui-overlay::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
      }
      #ui-overlay::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
      }
      h1 {
        font-size: 1.4rem;
        margin: 0 0 32px 0;
        background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-weight: 800;
      }
      .control-group {
        margin-bottom: 28px;
      }
      label {
        display: block;
        margin-bottom: 10px;
        font-size: 0.75rem;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        font-weight: 600;
      }
      select {
        width: 100%;
        background: #1a1a2e;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #fff;
        padding: 12px;
        border-radius: 8px;
        outline: none;
        transition: all 0.2s;
        cursor: pointer;
        font-size: 0.9rem;
      }
      select:hover {
        border-color: rgba(255, 255, 255, 0.3);
      }
      select:focus {
        border-color: #00f2fe;
        box-shadow: 0 0 0 2px rgba(0, 242, 254, 0.2);
      }
      input[type="number"] {
        flex: 1;
        background: #1a1a2e;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #fff;
        padding: 10px;
        border-radius: 8px;
        text-align: center;
        font-size: 1.1rem;
        font-family: monospace;
        outline: none;
        -moz-appearance: textfield;
        appearance: textfield;
      }
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        appearance: none;
        margin: 0;
      }
      input[type="number"]:focus {
        border-color: #00f2fe;
      }
      .hp-controls {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .btn-ctrl {
        background: #1a1a2e;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #00f2fe;
        width: 44px;
        height: 44px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1.4rem;
        font-weight: bold;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .btn-ctrl:hover {
        background: #2a2a4e;
        border-color: #00f2fe;
        transform: translateY(-1px);
      }
      .btn-ctrl:active {
        transform: translateY(1px);
      }
      .hp-value {
        display: none;
      }
      .checkbox-container {
        display: flex;
        align-items: center;
        cursor: pointer;
        font-size: 0.85rem;
        color: #888;
        user-select: none;
        gap: 12px;
        margin-top: 10px;
        transition: color 0.2s;
      }
      .checkbox-container:hover {
        color: #fff;
      }
      .checkbox-container input {
        display: none;
      }
      .checkmark {
        width: 20px;
        height: 20px;
        background-color: #1a1a2e;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        position: relative;
        transition: all 0.2s;
      }
      .checkbox-container:hover .checkmark {
        border-color: rgba(0, 242, 254, 0.5);
      }
      .checkbox-container input:checked + .checkmark {
        background-color: #00f2fe;
        border-color: #00f2fe;
        box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
      }
      .checkmark:after {
        content: "";
        position: absolute;
        display: none;
        left: 6px;
        top: 2px;
        width: 5px;
        height: 10px;
        border: solid #000;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
      }
      .checkbox-container input:checked + .checkmark:after {
        display: block;
      }
      .hint {
        margin-top: auto;
        font-size: 0.8rem;
        color: #555;
        line-height: 1.6;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        padding-top: 20px;
      }
      kbd {
        background: #222;
        padding: 2px 6px;
        border-radius: 4px;
        color: #bbb;
        border: 1px solid #333;
        font-family: monospace;
      }
      p {
        margin: 8px 0;
      }
    </style>
  </head>
  <body>
    <div id="ui-overlay">
      <h1>Test Lab</h1>

      <div class="control-group">
        <label for="entity-select">Entity Template</label>
        <select id="entity-select">
          <optgroup label="Enemies">
            <option value="type1">Shooter Drone</option>
            <option value="type2">Heavy Tank</option>
            <option value="type3">Dive Bomber</option>
            <option value="pinata">Piñata (Loot Drop)</option>
            <option value="boss">Mothership Boss</option>
            <option value="boss_no_orbiters">Mothership (No Orbiters)</option>
            <option value="orbiter">Boss Orbiter</option>
            <option value="missile">Homing Missile</option>
          </optgroup>
          <optgroup label="Loot">
            <option value="loot_blue">Blue Power Bolt</option>
            <option value="loot_green">Green Power Bolt</option>
            <option value="loot_red">Red Power Bolt</option>
            <option value="loot_star">Yellow Star</option>
          </optgroup>
        </select>
      </div>


      <div class="control-group">
        <h3>Stats & Debug</h3>
        <label for="hp-input">Spawn HP</label>
        <div class="hp-controls">
          <button id="hp-minus" class="btn-ctrl">−</button>
          <input type="number" id="hp-input" value="1" min="1" max="9999" />
          <button id="hp-plus" class="btn-ctrl">+</button>
        </div>
      </div>
      <div class="control-group">
        <label class="checkbox-container">
          <input type="checkbox" id="behavior-toggle" checked />
          <span class="checkmark"></span>
          Enable AI / Behavior
        </label>
      </div>

      <div class="control-group">
        <h3>Weapon Power Levels</h3>
        <div class="control-row">
          <label for="vulcanLevel">Vulcan:</label>
          <div class="hp-input-group">
            <button
              class="weapon-btn"
              data-target="vulcanLevel"
              data-delta="-1"
            >
              -
            </button>
            <input type="number" id="vulcanLevel" value="1" min="0" max="3" />
            <button class="weapon-btn" data-target="vulcanLevel" data-delta="1">
              +
            </button>
          </div>
        </div>
        <div class="control-row">
          <label for="shotgunLevel">Shotgun:</label>
          <div class="hp-input-group">
            <button
              class="weapon-btn"
              data-target="shotgunLevel"
              data-delta="-1"
            >
              -
            </button>
            <input type="number" id="shotgunLevel" value="0" min="0" max="3" />
            <button
              class="weapon-btn"
              data-target="shotgunLevel"
              data-delta="1"
            >
              +
            </button>
          </div>
        </div>
        <div class="control-row">
          <label for="latchLevel">Latch:</label>
          <div class="hp-input-group">
            <button class="weapon-btn" data-target="latchLevel" data-delta="-1">
              -
            </button>
            <input type="number" id="latchLevel" value="0" min="0" max="3" />
            <button class="weapon-btn" data-target="latchLevel" data-delta="1">
              +
            </button>
          </div>
        </div>
      </div>

      </div>
    </div>

    <div id="hint-overlay">
      <div class="hint">
        <p><kbd>Left Click</kbd> Spawn at cursor</p>
        <p><kbd>WASD</kbd> Move Ship</p>
        <p><kbd>Space</kbd> Primary Fire</p>
        <p><kbd>Q</kbd> Switch Weapon</p>
      </div>
    </div>

    <script type="module">
      const hpInput = document.getElementById("hp-input");
      const btnPlus = document.getElementById("hp-plus");
      const btnMinus = document.getElementById("hp-minus");
      const overlay = document.getElementById("ui-overlay");

      btnPlus.addEventListener("click", () => {
        hpInput.value = parseInt(hpInput.value) + 1;
      });
      btnMinus.addEventListener("click", () => {
        hpInput.value = Math.max(1, parseInt(hpInput.value) - 1);
      });

      // Prevent LittleJS from capturing events on the UI
      [
        "mousedown",
        "mouseup",
        "click",
        "mousemove",
        "contextmenu",
        "wheel",
        "keydown",
        "keyup",
        "change",
      ].forEach((eventName) => {
        overlay.addEventListener(eventName, (e) => e.stopPropagation());
      });
    </script>
    <script src="test.js" type="module"></script>
  </body>
</html>
