<!doctype html>
<head>
  <title>Alien Orbit Assault | Arcade Defense</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <link rel="icon" type="image/png" href="public/assets/shipA3.png" />
  <style>
    @font-face {
      font-family: "Exo 2";
      src: url("public/assets/fonts/Exo2-VariableFont_wght.ttf") format("truetype-variations");
      font-weight: 100 900;
      font-display: block;
    }
    @font-face {
      font-family: "Orbitron";
      src: url("public/assets/fonts/Orbitron-Medium.ttf") format("truetype");
      font-display: block;
    }
    @font-face {
      font-family: "Titillium Web";
      src: url("public/assets/fonts/TitilliumWeb-Regular.ttf") format("truetype");
      font-display: block;
    }

    #loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.4s ease;
    }
    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loader-ring {
      width: 52px;
      height: 52px;
      border: 4px solid #1a2a3a;
      border-top-color: #4af;
      border-radius: 50%;
      animation: loader-spin 0.75s linear infinite;
    }
    .loader-label {
      margin-top: 18px;
      color: #4af;
      font-family: "Orbitron", monospace;
      font-size: 13px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }
    @keyframes loader-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body style="background: #000; margin: 0;">
  <div id="loader">
    <div class="loader-ring"></div>
    <div class="loader-label">Loading…</div>
  </div>
  <script>
    // Capture keyboard input when embedded in an iframe
    window.focus();
    // Prevent context menu (right-click) from interrupting gameplay
    document.addEventListener("contextmenu", (e) => e.preventDefault());
  </script>
  <script>var DEV_BUILD = true;</script>
  <script src="game.js" type="module"></script>
</body>
